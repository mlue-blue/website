<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-top">
                <h1>My Personal Library</h1>
                <div class="header-actions">
                    <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <a href="add-book.html" class="add-book-btn">Add Book</a>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by title or author...">
            </div>
        </div>
    </header>

    <main class="container">
        <section class="stats">
            <p>Showing <span id="bookCount">0</span> books</p>
        </section>

        <div class="book-grid" id="bookGrid">
            <!-- Books will be rendered here by JavaScript -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <p>No books found matching your search.</p>
        </div>
    </main>

    <footer>
        <p>                </p>
    </footer>

    <!-- Reading Modal -->
    <div class="modal" id="readingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Book Title</h2>
                <button class="close-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="bookContent" class="book-content"></div>
            </div>
        </div>
    </div>

    <script src="books.js"></script>
</body>
</html>
