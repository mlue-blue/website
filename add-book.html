<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - My Personal Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-top">
                <a href="index.html" class="back-link">
                    <span class="back-arrow">←</span>
                    <span>Back to Library</span>
                </a>
                <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="add-book-container">
            <div class="page-header">
                <h2>Add a New Book</h2>
                <p class="subtitle">Add a book from your computer to your personal library</p>
            </div>

            <form id="addBookForm" class="add-book-form">
                <div class="form-group">
                    <label for="bookFile">Book File</label>
                    <input type="file" id="bookFile" accept=".txt" required>
                    <p class="form-hint">Select a .txt file from your computer</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookTitle">Title</label>
                        <input type="text" id="bookTitle" placeholder="Enter book title" required>
                    </div>

                    <div class="form-group">
                        <label for="bookAuthor">Author</label>
                        <input type="text" id="bookAuthor" placeholder="Enter author name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookYear">Year</label>
                        <input type="number" id="bookYear" placeholder="e.g. 1925" required>
                    </div>

                    <div class="form-group">
                        <label for="bookCover">Cover Image (optional)</label>
                        <input type="file" id="bookCover" accept="image/*">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Book</button>
                </div>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="20" fill="var(--accent-light)"/>
                    <path d="M16 24L22 30L32 18" stroke="var(--accent-hover)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h3>Book Added Successfully!</h3>
                <p>Your book has been added to your personal library.</p>
                <a href="index.html" class="btn btn-primary">View Library</a>
            </div>
        </div>
    </main>

    <script src="books.js"></script>
    <script>
        // Cancel button - go back to home
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Auto-populate title from filename
        document.getElementById('bookFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const title = file.name.replace('.txt', '').replace(/[-_]/g, ' ');
                const words = title.split(' ').map(word =>
                    word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                ).join(' ');
                document.getElementById('bookTitle').value = words;
            }
        });
    </script>
</body>
</html>
